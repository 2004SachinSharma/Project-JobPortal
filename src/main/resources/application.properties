spring.application.name=jobportal
spring.mvc.apiversion.use.header=Api-Version

# DATABASE CONFIGURATION
#spring.datasource.url=jdbc:h2:mem:jobportaldb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

#the below properties were configured when we were connecting to the container running in the docker with the help of the application.properties file only
#Yes it was configured for container running mysql only when we did not have compose.yml, but Generally the below configs are not only for the container specifically
#they can also be used for the local system setup mysql or any other database in the same way. see below carefully it just tells the spring, about where to find database,
# which port, which database, what is the username, what is the password to log in to it, Nowhere docker only written. So try to be loosely coupled then being tightly coupled to docker connection only.


#But I am commenting-in it because we want to use JPA Buddy for auto-entityGeneration from database. Because JPABuddy reads these configurations only to look into the DB
 spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:jobportal}
spring.datasource.username = ${DATABASE_USERNAME:root}
spring.datasource.password=  ${DATABASE_PASSWORD:mycustompass}

#now since this job is being handled by the compose.yml specifically for Docker container, I have commented out the above properties just to highlight that the spring is looking for compose.yml only for the connection of db runnig in the container

# H2 CONSOLE CONFIGURATION
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA / HIBERNATE CONFIGURATION

#(NOTE:Hibernate does not have to do anything with the 'script-files/.sql_files' these script files are for the application to tell it when to
# create schema and initialize the database. Hibernate just looks at our entity classes, for interacting with the database. For hibernate even
# if those ' .sql' files get deleted, Not an issue it only looks at Entity class to interact with the database to update it, validate it, or create it etc.
# if entity class would not exist, then congratulations to you; runtime error. Similar to this SpringBoot Application also need not to do anything with the Entity class
# it just needs those .sql scripts to populate schema/data)

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#SQL SCRIPTS (.sql files) CONFIGURATION ON STARTUP OF THE APPLICATION.

#(NOTE:Dont get confused between the hibernate interaction for DDL with the database and application interaction for initializing the database,
# these below configurations are diffrent from hibernate configurations above, these configurations are the guide to the Spring application
# to tell it, when to run those(.sql) scripts, and where to find them. While the above configurations are the guide to hibernate)

# In Spring Boot, spring.sql.init.mode controls when SQL scripts (schema.sql / data.sql) are executed to initialize the database.
spring.sql.init.mode=embedded
#With 'embedded mode' the 'schema.sql' and the 'data.sql' file only run if the database used is the embedded/in-memory database i.e. H2 DB. Other wise will not run in this mode.
#With 'always mode' both the files will run at the time of the application start, regardless of which database used. Whether it is in-memory, system-set-up DB, or any container running DB i.e., As we are running MySQL in the Docker container.
#With 'never' the script files will never run.

spring.sql.init.schema-locations=optional:classpath:sql/schema.sql
spring.sql.init.data-locations=optional:classpath:sql/data.sql


#RECOMMENDATION: this is generally recommended to use hibernate 'ddl.auto=update' or create in the development phase only, not in production because with it hibernate
#handles the creation of schema and the data filling and updating of the data, we don't want this. Instead, we want such critical DB's operation to be handled in the
#audit of the DBA or human, so basically DBA controls their execution rather than the Hibernate in the production
# we keep it to 'none' in production.

# LOGGING CONFIGURATION

logging.pattern.console=${CONSOLE_LOG_PATTERN:%white(%d{HH:mm:ss.SSS}) %yellow(%-5level) %blue([%thread]) %red(%logger{15}) - %green(%msg%n)}


#Docker Configuration

# NOTE:
# Don?t get confused about database creation, query execution, connection handling, etc.
# Docker itself does NOT perform any of these tasks.

# Docker?s responsibility is only to provide a running MySQL database instance inside a container.

# All database-related operations such as:
# - Creating databases/tables
# - Executing queries
# - Managing connections
# - Exception handling
# - Schema generation
# - Data population/initialization
# - ORM mapping

# are handled by the Spring Boot + Hibernate/JPA application, NOT by Docker.

# Docker simply provides an isolated and portable environment in which MySQL runs,
# and the Spring Boot application connects to that running database container.

# Also, using Docker for the database is OPTIONAL.
# We can also connect our Spring Boot application to a MySQL database
# installed directly on the system (locally installed MySQL).

# In both cases, the application only needs correct database configurations such as:
# - URL
# - Username
# - Password
# - Port
# - Database name

# These configurations are usually defined inside application.properties
# or application.yml using datasource properties.

# Example:
# spring.datasource.url
# spring.datasource.username
# spring.datasource.password

# If MySQL is installed directly on the system,
# Spring Boot connects using the locally running database credentials and port.

# If MySQL runs inside a Docker container,
# then docker-compose.yml is used to define and run the container configuration,
# and Spring Boot/Hibernate connects to that containerized database using those details.

# So ultimately:
# - Docker/Compose => Provides and runs the database container
# - Spring Boot/Hibernate => Uses datasource configurations to connect and work with the database

#We can change Docker's compose.yml file name and give any custom name
#spring.docker.compose.file = jobportal-compose.yml

#although by default spring looks for the name like docker-compose.yml, compose.yml, etc.
#but from here by configuring this name we can tell to spring, hey please search for jobportal-compose.yml as a docker's compose.yml file.
#despite we cna change the name, I am not going to change the name, rather I would keep it compose.yml only

spring.docker.compose.lifecycle-management=start_only
#bydefault it is start-stop means it by default get start and stop each time the application is started and stopped, I want it to be UP, regardless of application starts and stops.

springdoc.swagger-ui.path=/swagger-ui.html
